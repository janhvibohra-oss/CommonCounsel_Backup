<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommonCounsel — Canada's Business Growth Co-Pilot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#20407F; --blue-l:#eef2fb; --blue-m:#4a72c4;
  --orange:#DD4B0B; --orange-l:#fdf0eb;
  --purple:#8B2FC9; --purple-l:#f3eafb;
  --grad:linear-gradient(135deg,#20407F 0%,#8B2FC9 50%,#DD4B0B 100%);
  --grad-soft:linear-gradient(135deg,rgba(32,64,127,.07) 0%,rgba(139,47,201,.05) 50%,rgba(221,75,11,.05) 100%);
  --dark:#111; --mid:#555; --light:#999;
  --border:#ebebeb; --white:#fff;
  --green:#15803d; --green-bg:#dcfce7;
  --amber:#92400e; --amber-bg:#fef3c7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#fff;color:var(--dark);overflow-x:hidden;cursor:none}
#cur{width:6px;height:6px;background:var(--blue);border-radius:50%;position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s}
#cur-ring{width:28px;height:28px;border:1.5px solid rgba(32,64,127,.3);border-radius:50%;position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);transition:border-color .2s,transform .3s}
body.hovering #cur{width:10px;height:10px;background:var(--purple)}
body.hovering #cur-ring{border-color:rgba(139,47,201,.4);transform:translate(-50%,-50%) scale(1.8)}
body.clicking #cur{background:var(--orange);transform:translate(-50%,-50%) scale(.7)}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;transition:transform .4s cubic-bezier(.23,1,.32,1),background .3s,box-shadow .3s}
nav.scrolled{background:rgba(255,255,255,.93);backdrop-filter:blur(20px);box-shadow:0 1px 0 var(--border)}
nav.hidden{transform:translateY(-100%)}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:none;text-decoration:none}
.logo-m{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;letter-spacing:-.5px;transition:transform .3s}
.nav-logo:hover .logo-m{transform:rotate(-5deg) scale(1.08)}
.logo-t{font-size:15px;font-weight:800;color:var(--dark)}
.nav-links{display:flex;gap:2px}
.nav-links a{padding:6px 13px;font-size:13px;font-weight:500;color:var(--mid);text-decoration:none;border-radius:100px;cursor:none;transition:all .2s}
.nav-links a:hover{color:var(--dark);background:#f4f4f4}
.nav-r{display:flex;align-items:center;gap:8px}
.btn-ghost{background:none;border:none;font-size:13px;font-weight:600;color:var(--mid);cursor:none;padding:7px 13px;font-family:'Inter',sans-serif;transition:color .2s}
.btn-ghost:hover{color:var(--dark)}
.btn-pill{background:var(--dark);color:#fff;border:none;cursor:none;padding:8px 18px;border-radius:100px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;transition:all .25s;position:relative;overflow:hidden}
.btn-pill::after{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .3s}
.btn-pill:hover::after{opacity:1}
.btn-pill span{position:relative;z-index:1}
.page{display:none;min-height:100vh}
.page.active{display:block}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:hidden}
.h-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orb 10s ease-in-out infinite}
.o1{width:500px;height:500px;background:rgba(32,64,127,.06);top:-150px;left:-150px}
.o2{width:400px;height:400px;background:rgba(139,47,201,.05);bottom:-100px;right:-100px;animation-delay:-4s}
.o3{width:300px;height:300px;background:rgba(221,75,11,.04);top:50%;left:60%;animation-delay:-7s}
@keyframes orb{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-20px)}66%{transform:translate(-15px,15px)}}
.h-grid{position:absolute;inset:0;opacity:.015;background-image:linear-gradient(var(--blue) 1px,transparent 1px),linear-gradient(90deg,var(--blue) 1px,transparent 1px);background-size:48px 48px}
.h-cnt{position:relative;z-index:1;max-width:780px}
.h-badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);padding:7px 16px;border-radius:100px;font-size:12px;font-weight:600;color:var(--mid);margin-bottom:28px;box-shadow:0 2px 12px rgba(0,0,0,.06);animation:fup .7s .1s both}
.live{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:livep 1.5s ease-in-out infinite}
@keyframes livep{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.hero h1{font-size:clamp(36px,5.5vw,68px);font-weight:800;line-height:1.06;letter-spacing:-2.5px;color:var(--dark);margin-bottom:20px;animation:fup .8s .2s both}
.gt{background:linear-gradient(135deg,#20407F,#8B2FC9,#DD4B0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-sub{font-size:17px;font-weight:400;line-height:1.65;color:var(--mid);max-width:540px;margin:0 auto 36px;animation:fup .8s .3s both}
.h-inp{display:flex;max-width:440px;margin:0 auto 24px;background:#fff;border:1.5px solid var(--border);border-radius:100px;padding:5px 5px 5px 22px;box-shadow:0 4px 20px rgba(0,0,0,.07);animation:fup .8s .4s both;transition:border-color .2s,box-shadow .2s}
.h-inp:focus-within{border-color:var(--blue);box-shadow:0 0 0 4px rgba(32,64,127,.08),0 4px 20px rgba(0,0,0,.07)}
.h-inp input{flex:1;border:none;outline:none;font-size:14px;font-family:'Inter',sans-serif;background:transparent;color:var(--dark)}
.h-inp input::placeholder{color:#bbb}
.btn-hero{background:var(--dark);color:#fff;border:none;cursor:none;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .25s;position:relative;overflow:hidden}
.btn-hero::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .3s}
.btn-hero:hover::before{opacity:1}
.btn-hero span{position:relative;z-index:1}
.h-av{display:flex;align-items:center;justify-content:center;gap:10px;animation:fup .8s .5s both}
.avs{display:flex}
.av{width:28px;height:28px;border-radius:50%;border:2px solid #fff;margin-left:-8px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.av:first-child{margin-left:0}
.av1{background:linear-gradient(135deg,var(--blue),var(--blue-m));color:#fff}
.av2{background:linear-gradient(135deg,var(--orange),#f07a3a);color:#fff}
.av3{background:linear-gradient(135deg,var(--purple),#b060e8);color:#fff}
.av4{background:linear-gradient(135deg,#15803d,#4ade80);color:#fff}
.h-av p{font-size:13px;color:var(--light)}
.h-av strong{color:var(--dark)}
.h-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:40px;animation:fup .8s .6s both}
.hpill{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);padding:7px 14px;border-radius:100px;font-size:12px;font-weight:600;color:var(--mid);box-shadow:0 1px 4px rgba(0,0,0,.04);cursor:none;transition:all .25s}
.hpill:hover{border-color:var(--purple);color:var(--purple);transform:translateY(-2px);box-shadow:0 4px 14px rgba(139,47,201,.12)}
.sh{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;animation:fup 1s 1s both}
.sl{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--blue));animation:sline 1.6s ease-in-out infinite}
@keyframes sline{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
.sh span{font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase}
.mq-wrap{background:var(--grad);overflow:hidden}
.mq-inner{display:flex;width:max-content;animation:mq 22s linear infinite}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mqp{display:flex;align-items:center;gap:10px;padding:16px 36px;border-right:1px solid rgba(255,255,255,.15);white-space:nowrap}
.mqp .mn{font-size:20px;font-weight:800;color:#fff}
.mqp .ml{font-size:11px;color:rgba(255,255,255,.6);font-weight:500}
.sec{padding:100px 48px;max-width:1200px;margin:0 auto}
.sec-full{padding:100px 0}
.sec-in{max-width:1200px;margin:0 auto;padding:0 48px}
.ey{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.ey-b{color:var(--blue)}.ey-o{color:var(--orange)}.ey-p{color:var(--purple)}
h2.st{font-size:clamp(32px,3.8vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;color:var(--dark);margin-bottom:14px}
.sub{font-size:16px;font-weight:400;color:var(--mid);line-height:1.7;max-width:500px}
.prob-wrap{background:linear-gradient(160deg,#0d1a35 0%,#1a1040 50%,#2a0d0d 100%)}
.prob-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden;margin-top:56px}
.prob-card{background:#0f172a;padding:36px;position:relative;overflow:hidden;transition:background .3s}
.prob-card:hover{background:#131f35}
.prob-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.23,1,.32,1)}
.prob-card:hover::before{transform:scaleX(1)}
.prob-n{font-size:64px;font-weight:900;color:rgba(255,255,255,.03);position:absolute;top:12px;right:16px}
.prob-icon{font-size:26px;margin-bottom:16px}
.prob-card h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
.prob-card p{font-size:14px;color:rgba(255,255,255,.4);line-height:1.7;font-weight:400}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:56px}
.fc{background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px;cursor:none;position:relative;overflow:hidden;transition:transform .3s cubic-bezier(.23,1,.32,1),box-shadow .3s,border-color .3s}
.fc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--grad);transform:scaleX(0);transition:transform .4s cubic-bezier(.23,1,.32,1)}
.fc:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.08);border-color:transparent}
.fc:hover::after{transform:scaleX(1)}
.fc.wide{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center}
.fi{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px;transition:transform .3s}
.fc:hover .fi{transform:scale(1.12) rotate(-4deg)}
.fi-b{background:var(--blue-l)}.fi-o{background:var(--orange-l)}.fi-p{background:var(--purple-l)}
.fc h3{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--dark);margin-bottom:8px}
.fc p{font-size:14px;color:var(--mid);line-height:1.7;font-weight:400;margin-bottom:18px}
.fc-lnk{font-size:13px;font-weight:700;color:var(--blue);display:inline-flex;align-items:center;gap:5px;cursor:none;transition:gap .2s}
.fc:hover .fc-lnk{gap:9px}
.arr{transition:transform .2s}
.fc:hover .arr{transform:translateX(3px)}
.mini-rm{background:var(--blue-l);border-radius:14px;padding:22px}
.mini-rm-lbl{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.mrr{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#fff;border-radius:9px;margin-bottom:6px;border:1px solid var(--border);font-size:11px;transition:transform .2s}
.mrr:hover{transform:translateX(3px)}
.md{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.md-ok{background:var(--green-bg);color:var(--green)}.md-cur{background:var(--orange-l);color:var(--orange)}.md-todo{background:#f4f4f4;color:var(--light)}
.mi{flex:1}.mi b{display:block;font-size:11px;font-weight:700;color:var(--dark)}.mi span{font-size:10px;color:var(--light)}
.rt{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px}
.rf{background:var(--blue-l);color:var(--blue)}.rp{background:var(--green-bg);color:var(--green)}.rm{background:var(--orange-l);color:var(--orange)}
.timeline-wrap{position:relative;margin-top:48px}
.timeline-wrap::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--blue),var(--purple),var(--orange));border-radius:2px;opacity:.2}
.tl-item{display:flex;gap:20px;margin-bottom:0;position:relative;align-items:stretch}
.tl-item:last-child .tl-right{border-bottom:none;padding-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:58px}
.tl-node{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;border:2px solid;position:relative;z-index:1;background:#fff;transition:all .3s;flex-shrink:0}
.tl-node.done{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.tl-node.current{background:var(--orange-l);border-color:var(--orange);color:var(--orange);box-shadow:0 0 0 4px rgba(221,75,11,.12)}
.tl-node.todo{background:#f8f8f8;border-color:var(--border);color:var(--light)}
.tl-right{flex:1;padding:10px 0 28px 4px;border-bottom:1px solid var(--border)}
.tl-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tl-title{font-size:15px;font-weight:700;color:var(--dark)}
.tl-tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:100px;white-space:nowrap}
.tl-tag.fed{background:var(--blue-l);color:var(--blue)}
.tl-tag.prov{background:var(--green-bg);color:var(--green)}
.tl-tag.mun{background:var(--orange-l);color:var(--orange)}
.tl-meta{display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.tl-meta span{font-size:12px;color:var(--mid);display:flex;align-items:center;gap:4px}
.tl-meta strong{color:var(--dark);font-weight:700}
.tl-link{font-size:12px;color:var(--blue);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;cursor:none;transition:gap .2s}
.tl-link:hover{gap:7px}
.tl-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap;align-self:flex-start;margin-top:2px}
.st-done{background:var(--green-bg);color:var(--green)}
.st-cur{background:var(--orange-l);color:var(--orange)}
.st-todo{background:#f4f4f4;color:var(--light)}
.sf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.sf{background:#fff;border:1px solid var(--border);border-radius:18px;padding:28px;cursor:none;transition:all .3s;position:relative;overflow:hidden}
.sf::before{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:opacity .3s}
.sf:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.07);border-color:transparent}
.sf:hover::before{opacity:1}
.sf>*{position:relative;z-index:1}
.sf h3{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--dark);margin-bottom:8px}
.sf p{font-size:13px;color:var(--mid);line-height:1.6;margin-bottom:18px}
.sfb{display:inline-flex;align-items:center;gap:6px;background:var(--dark);color:#fff;border:none;cursor:none;padding:9px 18px;border-radius:100px;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;transition:all .25s;position:relative;overflow:hidden}
.sfb::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .3s}
.sfb:hover::before{opacity:1}
.sfb span{position:relative;z-index:1}
.sa{position:relative;z-index:1;transition:transform .2s}
.sfb:hover .sa{transform:translateX(3px)}
.how-bg{background:#fafafa}
.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:52px;position:relative}
.steps::before{content:'';position:absolute;top:34px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,rgba(32,64,127,.15),rgba(139,47,201,.15),rgba(221,75,11,.15))}
.step{text-align:center;position:relative;z-index:1;background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px 14px;transition:all .3s;cursor:none}
.step:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.06)}
.sn{width:48px;height:48px;border-radius:50%;background:#fff;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--blue);margin:0 auto 14px;transition:all .3s}
.step:hover .sn{background:var(--grad);color:#fff;border-color:transparent}
.step h4{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:6px}
.step p{font-size:12px;color:var(--light);line-height:1.6;font-weight:400}
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:48px}
.ind{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px 18px;cursor:none;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.ind::before{content:'';position:absolute;inset:0;background:var(--grad-soft);opacity:0;transition:opacity .3s}
.ind:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,.07);border-color:transparent}
.ind:hover::before{opacity:1}
.ind>*{position:relative;z-index:1}
.ie{font-size:26px;margin-bottom:8px;display:block;transition:transform .3s}
.ind:hover .ie{transform:scale(1.18) rotate(-5deg)}
.ind h4{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px}
.ind span{font-size:11px;color:var(--light)}
.cases-wrap{background:linear-gradient(135deg,#0f1c3f 0%,#1a0a35 50%,#2d1000 100%)}
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:52px}
.cc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;cursor:none;transition:all .3s}
.cc:hover{background:rgba(255,255,255,.09);transform:translateY(-5px);border-color:rgba(255,255,255,.15)}
.cc-top{padding:24px 24px 18px}
.cc-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;display:block}
.cc h3{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:4px}
.cc-city{font-size:12px;color:rgba(255,255,255,.35)}
.cc-mid{padding:16px 24px;border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07)}
.cc-quote{font-size:14px;color:rgba(255,255,255,.55);line-height:1.65;font-style:italic}
.cc-bot{padding:18px 24px;display:flex;flex-direction:column;gap:5px}
.cc-r{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,.5)}
.cc-r::before{content:'✓';color:#4ade80;font-weight:700;font-size:10px}
.cc-r b{color:#fff}
.btn-cc{margin-top:10px;background:none;border:1px solid rgba(255,255,255,.18);color:#fff;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;cursor:none;transition:all .25s;align-self:flex-start}
.btn-cc:hover{background:#fff;color:var(--blue)}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:48px}
.tc{background:#fff;border:1px solid var(--border);border-radius:18px;padding:28px;transition:all .3s;cursor:none}
.tc:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.05)}
.tc-stars{font-size:13px;letter-spacing:2px;margin-bottom:14px}
.tc p{font-size:15px;font-weight:400;color:var(--dark);line-height:1.65;margin-bottom:18px}
.tc-au strong{font-size:13px;font-weight:700;color:var(--dark);display:block}
.tc-au span{font-size:12px;color:var(--light)}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:48px}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:22px;padding:32px;position:relative;transition:all .3s;cursor:none}
.pc:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.07)}
.pc.feat{background:var(--dark);border-color:var(--dark)}

<body>
<div id="cur"></div>
<div id="cur-ring"></div>

<script>
// CURSOR
const cur=document.getElementById('cur'),crng=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;crng.style.left=rx+'px';crng.style.top=ry+'px';requestAnimationFrame(a);})();
document.addEventListener('mousedown',()=>document.body.classList.add('clicking'));
document.addEventListener('mouseup',()=>document.body.classList.remove('clicking'));
function addHover(sel){document.querySelectorAll(sel).forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));});}
// We will call addHover after the DOM is fully assembled

// REVEAL
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');obs.unobserve(x.target);}});},{threshold:.1,rootMargin:'0px 0px -30px 0px'});
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
});
</script>
