<div class="dv-ov" id="dv-ov" onclick="closeDV(event)">
  <div class="dv">
    <div class="dv-hdr">
      <h3 id="dv-title">Document</h3>
      <div class="dv-acts">
        <button class="btn-dv" onclick="window.print()">🖨️ Print</button>
        <button class="btn-dv pr" id="btn-pdf" onclick="downloadPDF()">⬇ Download PDF</button>
        <button class="dv-x" onclick="closeDV()">✕</button>
      </div>
    </div>
    <div class="dv-body" id="dv-body"></div>
  </div>
</div>

<script>
let currentDocId='';

function openDV(id){
  const d=docs[id];if(!d)return;
  currentDocId=id;
  document.getElementById('dv-title').textContent=d.title;
  document.getElementById('dv-body').innerHTML=d.html;
  document.getElementById('dv-ov').classList.add('open');
}
function closeDV(e){if(!e||e.target===document.getElementById('dv-ov'))document.getElementById('dv-ov').classList.remove('open');}

function downloadPDF(){
  const title=document.getElementById('dv-title').textContent;
  const body=document.getElementById('dv-body').innerHTML;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:Arial,sans-serif;margin:40px;color:#111;font-size:13px;line-height:1.7}h1{font-size:18px;margin-bottom:4px}.dp-head{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid #111}.dp-wm{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;margin-bottom:8px;text-transform:uppercase}.dp-wm.ok{background:#eef2fb;color:#20407F}.dp-wm.pd{background:#fef3c7;color:#92400e}.dp-wm.dn{background:#dcfce7;color:#15803d}.dp-title{font-size:16px;font-weight:800;margin-bottom:4px}.dp-sub{font-size:12px;color:#555}.dp-sec{margin-top:22px;margin-bottom:10px;font-size:11px;font-weight:700;color:#20407F;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #eef2fb;padding-bottom:5px}.dp-field{margin-bottom:12px}.dp-lbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:3px}.dp-val{font-size:14px;font-weight:600;padding:8px 12px;background:#fafafa;border:1px solid #ebebeb;border-radius:4px}.dp-clause{font-size:13px;line-height:1.7;margin-bottom:8px;padding-left:14px;border-left:2px solid #ebebeb}.dp-sig{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px;padding-top:20px;border-top:1px solid #ebebeb}.dp-sig-ln{border-top:1.5px solid #111;padding-top:6px;font-size:11px;color:#555}.dp-note{font-size:11px;color:#999;text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #ebebeb;font-style:italic}.dp-submit-box{background:#eef2fb;border-radius:8px;padding:16px;margin-top:20px}.dp-submit-box h4{color:#20407F;margin-bottom:8px}.dp-submit-link{color:#20407F;font-weight:700}</style></head><body>${body}<script>window.onload=function(){window.print();}<\/script></body></html>`);
  win.document.close();
}

const docs={
  vault:{title:'📁 Document Vault — Pita Palace',html:`<p style="font-size:14px;color:var(--mid);margin-bottom:20px;font-weight:400">All documents pre-filled with your business information. Click any to preview. Use the Download PDF button to save.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">${[['inc','Articles of Incorporation','Federal','Ready','ds-ok'],['ont','ON Business Registration','Provincial','Ready','ds-ok'],['licence','Toronto Business Licence','Municipal','Pending','ds-pd'],['gst','GST/HST Registration','Federal','Done','ds-ok'],['emp','Employment Contract','Provincial','Ready','ds-ok'],['nda','Non-Disclosure Agreement','General','Ready','ds-ok'],['sha','Shareholder Agreement','Federal','Ready','ds-ok'],['vendor','Vendor Agreement','General','Ready','ds-ok'],['privacy','PIPEDA Privacy Policy','Federal','Ready','ds-ok'],['cipo','CIPO Trademark Application','Federal','Draft','ds-pd'],['food','Food Handler Application','Provincial','Pending','ds-pd'],['wsib','WSIB Registration','Provincial','Ready','ds-ok']].map(([id,n,l,s,c])=>`<div onclick="openDV('${id}')" style="padding:12px;border:1px solid var(--border);border-radius:10px;cursor:none;display:flex;align-items:center;gap:8px;transition:all .2s" onmouseover="this.style.borderColor='var(--blue)';this.style.background='var(--blue-l)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='#fff'"><span>📄</span><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n}</div><div style="font-size:10px;color:var(--light)">${l}</div></div><span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap" class="${c}">${s}</span></div>`).join('')}</div>`},

  ont:{title:'📄 Ontario Business Name Registration',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · Ready to Submit</span><div class="dp-title">BUSINESS NAME REGISTRATION</div><div class="dp-sub">Ontario Business Registry · ServiceOntario</div></div><div class="dp-sec">Business Information</div><div class="dp-field"><div class="dp-lbl">Business Name</div><div class="dp-val">PITA PALACE</div></div><div class="dp-field"><div class="dp-lbl">Business Activity</div><div class="dp-val">Fast-casual Mediterranean restaurant and catering services</div></div><div class="dp-field"><div class="dp-lbl">Business Address</div><div class="dp-val">123 King Street West, Toronto, Ontario, M5H 1J9</div></div><div class="dp-sec">Registrant Information</div><div class="dp-field"><div class="dp-lbl">Full Legal Name</div><div class="dp-val">Amir Haddad</div></div><div class="dp-field"><div class="dp-lbl">Registration Period</div><div class="dp-val">5 years (renewable)</div></div><div class="dp-sig"><div><div class="dp-sig-ln">Registrant Signature</div><div style="margin-top:20px;font-size:12px">Amir Haddad</div></div><div><div class="dp-sig-ln">Date</div><div style="margin-top:20px;font-size:12px">March 8, 2026</div></div></div><div class="dp-submit-box"><h4>📋 Where to Submit</h4><p><strong>Ontario Business Registry (ServiceOntario)</strong> — Online at ontario.ca or in person at a ServiceOntario centre</p><p><strong>Fee:</strong> $60 · <strong>Processing:</strong> Immediate online · <strong>Renewal:</strong> Every 5 years</p><a class="dp-submit-link" href="https://www.ontario.ca/page/ontario-business-registry" target="_blank">🔗 Submit at Ontario Business Registry →</a></div><div class="dp-note">File online at Ontario Business Registry. Fee: $60. Processing: Immediate.</div></div>`},

  licence:{title:'📄 Toronto Business Licence Application',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm pd">⏳ In Progress · Review Required</span><div class="dp-title">BUSINESS LICENCE APPLICATION</div><div class="dp-sub">City of Toronto · Municipal Licensing &amp; Standards</div></div><div class="dp-sec">Business Details</div><div class="dp-field"><div class="dp-lbl">Business Name</div><div class="dp-val">Pita Palace</div></div><div class="dp-field"><div class="dp-lbl">Business Type</div><div class="dp-val">Food Service Establishment</div></div><div class="dp-field"><div class="dp-lbl">Business Address</div><div class="dp-val">123 King Street West, Toronto, Ontario, M5H 1J9</div></div><div class="dp-sec">Owner Information</div><div class="dp-field"><div class="dp-lbl">Owner / Operator</div><div class="dp-val">Amir Haddad</div></div><div class="dp-sec">Required Attachments</div><div class="dp-clause">☑ Proof of business registration (attached)</div><div class="dp-clause">☑ Zoning compliance confirmation</div><div class="dp-clause">☐ Food Handler Certificate (required before approval)</div><div class="dp-clause">☐ Health Inspection approval (Toronto Public Health will contact)</div><div style="background:var(--amber-bg);border-radius:10px;padding:14px;margin-top:16px"><p style="font-size:13px;font-weight:700;color:var(--amber);margin-bottom:3px">⚠️ 2 items required before approval</p><p style="font-size:12px;color:var(--amber);font-weight:400">Complete Food Handler Certificate and await Health Inspection scheduling.</p></div><div class="dp-submit-box"><h4>📋 Where to Submit</h4><p><strong>City of Toronto — Municipal Licensing &amp; Standards</strong> — Online at toronto.ca/business-licences or in person at 850 Coxwell Ave</p><p><strong>Fee:</strong> $195 · <strong>Processing:</strong> 1–2 weeks · <strong>Deadline:</strong> Before opening for business · <strong>Renewal:</strong> Annual</p><a class="dp-submit-link" href="https://www.toronto.ca/business-economy/business-operation-growth/business-licences-and-permits/" target="_blank">🔗 Apply at City of Toronto →</a></div></div>`},

  gst:{title:'📄 GST/HST Registration',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm dn">✓ Submitted · Registered</span><div class="dp-title">GST/HST REGISTRATION</div><div class="dp-sub">Canada Revenue Agency · Form RC1</div></div><div class="dp-sec">Registration Details</div><div class="dp-field"><div class="dp-lbl">Business Name</div><div class="dp-val">PITA PALACE INC.</div></div><div class="dp-field"><div class="dp-lbl">Business Number (BN)</div><div class="dp-val">123456789 RT0001</div></div><div class="dp-field"><div class="dp-lbl">Registration Date</div><div class="dp-val">March 1, 2026</div></div><div class="dp-field"><div class="dp-lbl">Reporting Period</div><div class="dp-val">Quarterly (January 1 – March 31)</div></div><div class="dp-sec">Tax Rates (Ontario)</div><div class="dp-clause">HST Rate: 13% (5% federal GST + 8% Ontario PST component)</div><div class="dp-clause">First filing due: April 30, 2026</div><div class="dp-clause">Zero-rated: Basic groceries, certain food items for resale</div><div style="background:var(--green-bg);border-radius:10px;padding:14px;margin-top:16px"><p style="font-size:13px;font-weight:700;color:var(--green)">✓ Successfully registered with CRA</p></div><div class="dp-submit-box"><h4>📋 Filing Information</h4><p><strong>Next filing due:</strong> April 30, 2026 (Q1 2026) · <strong>File via:</strong> CRA My Business Account or GST/HST NETFILE</p><p>Your GST/HST number must appear on all invoices over $30. Failure to collect and remit can result in penalties.</p><a class="dp-submit-link" href="https://www.canada.ca/en/revenue-agency/services/e-services/digital-services-businesses/gst-hst-netfile.html" target="_blank">🔗 File at CRA NETFILE →</a></div></div>`},

  emp:{title:'📄 Employment Agreement',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · Ready to Use</span><div class="dp-title">EMPLOYMENT AGREEMENT</div><div class="dp-sub">Province of Ontario · Employment Standards Act Compliant</div></div><div class="dp-sec">Parties</div><div class="dp-field"><div class="dp-lbl">Employer</div><div class="dp-val">Pita Palace Inc., 123 King Street West, Toronto, Ontario, M5H 1J9</div></div><div class="dp-field"><div class="dp-lbl">Employee</div><div class="dp-val">[Employee Full Name] — complete before signing</div></div><div class="dp-field"><div class="dp-lbl">Position</div><div class="dp-val">[Job Title] — complete before signing</div></div><div class="dp-sec">Terms of Employment</div><div class="dp-field"><div class="dp-lbl">Employment Type</div><div class="dp-val">Full-time · Permanent</div></div><div class="dp-field"><div class="dp-lbl">Start Date</div><div class="dp-val">[Start Date] — complete before signing</div></div><div class="dp-field"><div class="dp-lbl">Compensation</div><div class="dp-val">$[Hourly/Annual] — minimum Ontario wage: $17.20/hr (2026)</div></div><div class="dp-sec">Key Clauses</div><div class="dp-clause">The Employee will devote their full working time and attention to the performance of the duties assigned by the Employer.</div><div class="dp-clause">Either party may terminate this Agreement on [X] weeks notice, subject to the minimums required by the Employment Standards Act, 2000.</div><div class="dp-clause">The Employee will keep all business information, customer data, and trade secrets strictly confidential during and after employment.</div><div class="dp-sig"><div><div class="dp-sig-ln">Employer Signature</div><div style="margin-top:20px;font-size:12px">Amir Haddad, Pita Palace Inc.</div></div><div><div class="dp-sig-ln">Employee Signature</div><div style="margin-top:20px;font-size:12px">[Employee Name]</div></div></div><div class="dp-submit-box"><h4>📋 Requirements</h4><p><strong>No government filing required</strong> — sign and keep a copy for your records. Must be provided to employee on or before their first day of work.</p><p><strong>Ontario minimum wage (2026):</strong> $17.20/hr general · Must comply with the Employment Standards Act, 2000</p><a class="dp-submit-link" href="https://www.ontario.ca/document/your-guide-employment-standards-act-0" target="_blank">🔗 Ontario Employment Standards Act Guide →</a></div><div class="dp-note">Compliant with Ontario ESA 2000. Consult an employment lawyer for complex situations.</div></div>`},

  nda:{title:'📄 Non-Disclosure Agreement',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · Ready to Use</span><div class="dp-title">NON-DISCLOSURE AGREEMENT</div><div class="dp-sub">Mutual Confidentiality Agreement</div></div><div class="dp-sec">Parties</div><div class="dp-field"><div class="dp-lbl">Disclosing Party</div><div class="dp-val">Pita Palace Inc.</div></div><div class="dp-field"><div class="dp-lbl">Receiving Party</div><div class="dp-val">[Counterparty Name] — complete before signing</div></div><div class="dp-sec">Confidential Information</div><div class="dp-clause">Confidential Information means any data or information that is proprietary to Pita Palace Inc. and not generally known to the public, including business plans, financial projections, customer lists, recipes, supplier agreements, and operational processes.</div><div class="dp-sec">Obligations</div><div class="dp-clause">The Receiving Party agrees to hold all Confidential Information in strict confidence, to use the Confidential Information only for the purpose of evaluating a potential business relationship, and not to disclose Confidential Information to any third party without prior written consent.</div><div class="dp-field"><div class="dp-lbl">Duration of Confidentiality</div><div class="dp-val">2 years from date of disclosure</div></div><div class="dp-sig"><div><div class="dp-sig-ln">Pita Palace Inc.</div><div style="margin-top:20px;font-size:12px">Amir Haddad</div></div><div><div class="dp-sig-ln">Receiving Party</div><div style="margin-top:20px;font-size:12px">[Counterparty]</div></div></div><div class="dp-submit-box"><h4>📋 How to Use</h4><p><strong>No government filing required.</strong> Sign both copies, keep one, give one to the receiving party. For maximum enforceability, have each signature witnessed or notarized.</p><a class="dp-submit-link" href="https://www.ic.gc.ca/eic/site/061.nsf/eng/h_rd01060.html" target="_blank">🔗 ISED Trade Secrets Guide →</a></div><div class="dp-note">General NDA template. For complex arrangements, consult a business lawyer.</div></div>`},

  sha:{title:'📄 Shareholder Agreement',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Template · Customize Before Use</span><div class="dp-title">SHAREHOLDER AGREEMENT</div><div class="dp-sub">Pita Palace Inc. — Federal Corporation</div></div><div class="dp-sec">Shareholders</div><div class="dp-field"><div class="dp-lbl">Shareholder 1</div><div class="dp-val">Amir Haddad — [X]% of issued common shares</div></div><div class="dp-field"><div class="dp-lbl">Shareholder 2</div><div class="dp-val">[Name] — [X]% of issued common shares — complete if applicable</div></div><div class="dp-sec">Key Provisions</div><div class="dp-clause">The shareholders agree to vote their shares to elect the directors as set out in this Agreement.</div><div class="dp-clause">No shareholder shall transfer, sell, or assign their shares without first offering them to the other shareholders (right of first refusal).</div><div class="dp-clause">Major decisions including new share issuance, asset sale, and debt over $50,000 require unanimous shareholder consent.</div><div class="dp-submit-box"><h4>📋 Requirements</h4><p><strong>No government filing required</strong> — this is a private agreement among shareholders. Highly recommended to have a corporate lawyer review before signing.</p><p><strong>Keep with:</strong> Corporate minute book and records book.</p><a class="dp-submit-link" href="https://ised-isde.canada.ca/site/corporations-canada/en/maintaining-your-federal-corporation/corporate-records" target="_blank">🔗 Corporations Canada Corporate Records →</a></div><div class="dp-note">Template only. Have a corporate lawyer review before use.</div></div>`},

  vendor:{title:'📄 Vendor Agreement',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · Ready to Use</span><div class="dp-title">VENDOR / SUPPLIER AGREEMENT</div><div class="dp-sub">General Commercial Contract</div></div><div class="dp-sec">Parties</div><div class="dp-field"><div class="dp-lbl">Buyer</div><div class="dp-val">Pita Palace Inc.</div></div><div class="dp-field"><div class="dp-lbl">Vendor / Supplier</div><div class="dp-val">[Vendor Name] — complete before signing</div></div><div class="dp-sec">Terms</div><div class="dp-field"><div class="dp-lbl">Products / Services</div><div class="dp-val">[Description of goods or services]</div></div><div class="dp-field"><div class="dp-lbl">Payment Terms</div><div class="dp-val">Net 30 days from invoice date</div></div><div class="dp-field"><div class="dp-lbl">Delivery Terms</div><div class="dp-val">[Delivery schedule and location]</div></div><div class="dp-clause">The Vendor warrants that all goods supplied conform to the agreed specifications and are free from defects in material and workmanship.</div><div class="dp-submit-box"><h4>📋 How to Use</h4><p><strong>No government filing required.</strong> Both parties sign; keep a copy. For purchases over $10,000, consider having a lawyer review.</p></div><div class="dp-note">Customize payment terms and delivery details before use.</div></div>`},

  privacy:{title:'📄 PIPEDA Privacy Policy',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · PIPEDA Compliant</span><div class="dp-title">PRIVACY POLICY</div><div class="dp-sub">Pita Palace Inc. · Personal Information Protection and Electronic Documents Act</div></div><div class="dp-sec">Collection of Personal Information</div><div class="dp-clause">Pita Palace Inc. collects personal information such as names, email addresses, phone numbers, and payment information only when voluntarily provided by customers for the purpose of fulfilling orders, reservations, and communications.</div><div class="dp-sec">Use of Information</div><div class="dp-clause">We use collected information only for the purposes for which it was collected: processing orders, sending confirmations, responding to inquiries, and with consent, sending promotional communications.</div><div class="dp-sec">Protection &amp; Retention</div><div class="dp-clause">We protect personal information with appropriate technical and organizational safeguards. Data is retained only as long as necessary for the stated purposes or as required by law.</div><div class="dp-field"><div class="dp-lbl">Privacy Officer</div><div class="dp-val">Amir Haddad · privacy@pitapalace.ca</div></div><div class="dp-submit-box"><h4>📋 Requirements</h4><p><strong>No government registration required.</strong> Must be posted on your website and available to customers on request. Review and update annually or when data practices change.</p><a class="dp-submit-link" href="https://www.priv.gc.ca/en/privacy-topics/privacy-laws-in-canada/the-personal-information-protection-and-electronic-documents-act-pipeda/" target="_blank">🔗 OPC PIPEDA Guide →</a></div><div class="dp-note">Review annually. Update when data practices change.</div></div>`},

  cipo:{title:'📄 CIPO Trademark Application',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm pd">📝 Draft · Review Before Filing</span><div class="dp-title">TRADEMARK APPLICATION</div><div class="dp-sub">Canadian Intellectual Property Office · Form TM-APPL</div></div><div class="dp-sec">Applicant</div><div class="dp-field"><div class="dp-lbl">Applicant Name</div><div class="dp-val">Pita Palace Inc.</div></div><div class="dp-field"><div class="dp-lbl">Address</div><div class="dp-val">123 King Street West, Toronto, Ontario, M5H 1J9</div></div><div class="dp-sec">Trademark Details</div><div class="dp-field"><div class="dp-lbl">Trademark</div><div class="dp-val">PITA PALACE (word mark)</div></div><div class="dp-field"><div class="dp-lbl">Nice Classification</div><div class="dp-val">Class 43 — Food and drink services, restaurant services</div></div><div class="dp-field"><div class="dp-lbl">Basis for Application</div><div class="dp-val">Use in Canada — since March 2026</div></div><div class="dp-submit-box"><h4>📋 Where to Submit</h4><p><strong>Canadian Intellectual Property Office (CIPO)</strong> — Online via CIPO's Trademark e-filing system</p><p><strong>Fee:</strong> $458 online (first class) · <strong>Processing:</strong> 12–18 months · <strong>Duration:</strong> 10 years, renewable · <strong>Deadline:</strong> File before using mark commercially when possible</p><a class="dp-submit-link" href="https://www.ic.gc.ca/eic/site/cipointernet-internetopic.nsf/eng/h_wr04234.html" target="_blank">🔗 File at CIPO Trademark e-filing →</a></div><div class="dp-note">Conduct a clearance search before filing. Consider a trademark lawyer for complex marks.</div></div>`},

  food:{title:'📄 Food Handler Certificate Application',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm pd">⏳ Pending · Must Complete Training</span><div class="dp-title">FOOD HANDLER CERTIFICATION</div><div class="dp-sub">Province of Ontario · Health Protection and Promotion Act</div></div><div class="dp-sec">Applicant</div><div class="dp-field"><div class="dp-lbl">Name</div><div class="dp-val">Amir Haddad</div></div><div class="dp-field"><div class="dp-lbl">Business</div><div class="dp-val">Pita Palace Inc.</div></div><div class="dp-sec">Certification Requirements</div><div class="dp-clause">At least one person with a valid Food Handler Certificate must be on the premises at all times of operation.</div><div class="dp-clause">The certificate is obtained by completing an approved food safety training course and passing the examination with a score of 70% or higher.</div><div class="dp-field"><div class="dp-lbl">Approved Training Providers</div><div class="dp-val">City of Toronto, SafeCheck, National Food Safety Training Program</div></div><div class="dp-submit-box"><h4>📋 Where to Get Certified</h4><p><strong>Toronto Public Health</strong> offers Food Handler Certification courses. Also available via SafeCheck, FoodSafe, and NFSTP online.</p><p><strong>Cost:</strong> $35–$80 depending on provider · <strong>Duration:</strong> ~8 hour course · <strong>Deadline:</strong> Required before business licence approval · <strong>Validity:</strong> 5 years</p><a class="dp-submit-link" href="https://www.toronto.ca/community-people/health-wellness-care/health-programs-advice/food-safety/food-handler-certification/" target="_blank">🔗 Toronto Food Handler Certification →</a></div><div style="background:var(--amber-bg);border-radius:10px;padding:14px;margin-top:16px"><p style="font-size:13px;font-weight:700;color:var(--amber)">⚠️ Required before business licence approval</p></div></div>`},

  wsib:{title:'📄 WSIB Registration',html:`<div class="dp-paper"><div class="dp-head"><span class="dp-wm ok">✓ Pre-filled · Ready to Submit</span><div class="dp-title">WORKPLACE SAFETY AND INSURANCE BOARD REGISTRATION</div><div class="dp-sub">Province of Ontario · WSIB</div></div><div class="dp-sec">Employer Information</div><div class="dp-field"><div class="dp-lbl">Business Name</div><div class="dp-val">Pita Palace Inc.</div></div><div class="dp-field"><div class="dp-lbl">CRA Business Number</div><div class="dp-val">123456789</div></div><div class="dp-field"><div class="dp-lbl">Industry Classification</div><div class="dp-val">Food Services — Class G · Rate Group 623</div></div><div class="dp-field"><div class="dp-lbl">Expected Annual Payroll</div><div class="dp-val">$[Annual payroll] — complete before submitting</div></div><div class="dp-sec">WSIB Premium</div><div class="dp-clause">Premium rate for food services: approximately $1.17 per $100 of insurable earnings.</div><div class="dp-clause">Registration must be completed within 10 days of hiring your first employee.</div><div class="dp-submit-box"><h4>📋 Where to Submit</h4><p><strong>WSIB Ontario</strong> — Register online at wsib.ca using your CRA Business Number</p><p><strong>Fee:</strong> Premium based on payroll (approx. $1.17/$100) · <strong>Deadline:</strong> Within 10 days of first hire · <strong>Penalty for late registration:</strong> 2× premium owed</p><a class="dp-submit-link" href="https://www.wsib.ca/en/businesses/registering-your-business" target="_blank">🔗 Register at wsib.ca →</a></div><div class="dp-note">Mandatory for most Ontario employers. Failure to register results in significant penalties.</div></div>`}
